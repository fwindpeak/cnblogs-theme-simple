<script>
    (function () {
        // === 1. 将搜索框移动到左侧导航栏底部 ===
        const sidebarSearch = document.getElementById('sidebar_search');
        const navigator = document.getElementById('navigator');
        if (sidebarSearch && navigator) {
            navigator.appendChild(sidebarSearch);
        }

        // === 2. 亮暗色拟物主题切换逻辑 ===
        const toggleBtn = document.getElementById('sk-theme-btn');
        const body = document.body;
        const savedTheme = localStorage.getItem('fwindpeak_sk_theme');

        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            body.setAttribute('data-theme', 'dark');
        } else {
            body.setAttribute('data-theme', 'light');
        }

        toggleBtn.addEventListener('click', function () {
            let currentTheme = body.getAttribute('data-theme');
            let newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('fwindpeak_sk_theme', newTheme);
        });
    })();
</script>
